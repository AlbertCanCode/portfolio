name: Update Scratch Stats

on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 6am UTC
  workflow_dispatch:        # also lets you trigger it manually from GitHub

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and update follower count
        run: python update_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "chore: auto-update Scratch follower count" && git push)
