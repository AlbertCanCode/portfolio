<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — AlbertCanCode</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background:
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(99,102,241,0.1) 0%, transparent 70%),
        var(--bg);
    }
    .err-code {
      font-family: var(--mono);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px var(--accent);
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    .err-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .err-sub {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 380px;
      line-height: 1.65;
      margin-bottom: 2.5rem;
    }
    .err-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body class="loaded">

  <div class="page-404">
    <div class="err-code">404</div>
    <h1 class="err-title">Page not found</h1>
    <p class="err-sub">Looks like this level doesn't exist. Head back to the main menu.</p>
    <div class="err-links">
      <a href="/" class="btn btn-primary">Back to home</a>
      <a href="https://scratch.mit.edu/users/ChessProking-tm/" target="_blank" rel="noopener" class="btn btn-outline">Scratch Profile</a>
    </div>
  </div>

</body>
</html>
